schema_version: "1.0"

extension:
  id: fastflow
  name: "FastFlow"
  version: "1.0.0"
  description: "Lightweight single-file workflow for MVP-ready feature increments with Onion Architecture guardrails"
  author: "3myr"
  repository: "https://github.com/3myr/spec-kit-fastflow"
  license: "MIT"

requires:
  speckit_version: ">=0.4.0"

provides:
  commands:
    - name: speckit.fastflow.create
      file: commands/speckit.fastflow.create.md
      description: Generate a single-file spec for an evolutive feature increment
    - name: speckit.fastflow.implement
      file: commands/speckit.fastflow.implement.md
      description: Implement a feature increment directly from its FastFlow file
    - name: speckit.fastflow.classify
      file: commands/speckit.fastflow.classify.md
      description: Route work between tiny change, FastFlow, and full SDD

hooks:
  before_specify:
    command: speckit.fastflow.classify
    optional: true
    prompt: "Check if this task should use FastFlow instead of the full SDD workflow"

tags:
  - "lightweight"
  - "mvp"
  - "workflow"
  - "iterative-development"
  - "single-file-spec"
  - "onion-architecture"